<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0b07"/>
      <stop offset="100%" stop-color="#1a1508"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0c060"/>
      <stop offset="50%" stop-color="#d4af37"/>
      <stop offset="100%" stop-color="#b8860b"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#f0c060" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#d4af37" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Glow halo -->
  <ellipse cx="32" cy="32" rx="22" ry="22" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Border ring -->
  <rect x="2" y="2" width="60" height="60" rx="13" stroke="url(#gold)" stroke-width="0.8" stroke-opacity="0.5" fill="none"/>

  <!-- Corner accent marks -->
  <path d="M4 12 L4 4 L12 4" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M52 4 L60 4 L60 12" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M4 52 L4 60 L12 60" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M60 52 L60 60 L52 60" stroke="#d4af37" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>

  <!-- P letterform — bold serif-style -->
  <path d="
    M18 14 L18 50
    M18 14 L35 14
    Q46 14 46 26
    Q46 38 35 38
    L18 38
  " stroke="url(#gold)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Inner P bowl fill highlight -->
  <path d="M22 18 L33 18 Q41 18 41 26 Q41 34 33 34 L22 34 Z" fill="url(#gold)" opacity="0.12"/>
</svg>
